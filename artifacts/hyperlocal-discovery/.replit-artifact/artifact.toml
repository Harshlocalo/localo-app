kind = "mobile"
previewPath = "/"
title = "Hyperlocal Discovery"
version = "1.0.0"
id = "artifacts/hyperlocal-discovery"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 25255

[services.development]
run = "pnpm --filter @workspace/hyperlocal-discovery run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hyperlocal-discovery", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/hyperlocal-discovery", "run", "serve" ]

[services.env]
PORT = "25255"
BASE_PATH = "/"
